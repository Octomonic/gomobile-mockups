<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>GoMobile × OctoMonic</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Heebo',system-ui,sans-serif;background:#08090E;color:#EEF0F6;min-height:100vh;
    display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
  .box{max-width:460px}
  .box img{height:54px;width:auto;margin-bottom:26px;opacity:.95}
  h1{font-size:22px;font-weight:800;letter-spacing:-.3px;margin-bottom:10px}
  p{color:#9AA3B5;font-size:15px;line-height:1.7}
  .b{color:#F0C000;font-weight:800}
  .sep{height:1px;background:rgba(255,255,255,.1);margin:24px auto;width:120px}
  .box h1:nth-of-type(2){font-size:19px}
</style>
</head>
<body>
  <div class="box">
    <img src="logo.png" alt="OctoMonic">
    <h1>המסמך אינו זמין יותר</h1>
    <p><span class="b">OctoMonic</span> עובדת על הפרויקט שלכם.</p>
    <div class="sep"></div>
    <h1>This document is no longer available</h1>
    <p><span class="b">OctoMonic</span> is working on your project.</p>
  </div>
</body>
</html>
